<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container mt-5">

  <div class="d-flex justify-content-between mb-4">
    <h2 class="text-white">Dashboard</h2>
    <button onclick="logout()" class="btn btn-dark">Logout</button>
  </div>

  <div class="card p-4 mb-4 shadow">
    <h5>Create Request</h5>

    <input id="email" class="form-control mb-2" placeholder="Enter Email">

    <select id="type" class="form-control mb-2">
      <option value="ACCESS_DATA">ACCESS_DATA</option>
      <option value="DELETE_DATA">DELETE_DATA</option>
    </select>

    <button onclick="createRequest()" class="btn btn-primary">Submit Request</button>
  </div>

  <div class="card p-4 shadow">
    <h5>All Requests</h5>

    <button onclick="loadRequests()" class="btn btn-success mb-3">Load Requests</button>

    <ul id="requestList" class="list-group"></ul>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
